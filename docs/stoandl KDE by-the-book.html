<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>stoandl — KDE by-the-book (HIG-verified)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script src="app-data.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="kde-hig.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
  const ab = { background: 'transparent', borderRadius: 12, boxShadow: 'none' };
  const abPhone = { background: 'transparent', borderRadius: 38, boxShadow: 'none' };

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="bytthe book" title="stoandl · KDE by-the-book (Kirigami HIG-verified)"
          subtitle="Checked against develop.kde.org/hig/layout_and_nav: ≤5 destinations → NavigationTabBar (bottom on mobile, top on desktop); page actions in the toolbar (no Material FAB); Kirigami spacing scale; content constrained & centered on desktop. Both fully interactive — switch tabs, toggle, Pair.">
          <DCArtboard id="mobile" label="Mobile · NavigationTabBar bottom, header actions" width={322} height={672} style={abPhone}>
            <KdeMobile />
          </DCArtboard>
          <DCArtboard id="desktop" label="Desktop · NavigationTabBar top, centered content" width={940} height={640} style={ab}>
            <KdeDesktop width={940} height={640} />
          </DCArtboard>
        </DCSection>
        <DCSection id="states" title="Empty / error states — daemon-down, no-watch (notready), Bluetooth-off, reconnecting"
          subtitle="The cross-screen states CLAUDE.md mandates. Daemon-down hides the nav (nothing works without it); the rest keep the tab bar.">
          <DCArtboard id="st-daemon" label="Daemon not running (bus name unowned)" width={322} height={672} style={abPhone}>
            <StateDaemonDown />
          </DCArtboard>
          <DCArtboard id="st-nowatch" label="No watch connected (notready)" width={322} height={672} style={abPhone}>
            <StateNoWatch />
          </DCArtboard>
          <DCArtboard id="st-bt" label="Bluetooth off" width={322} height={672} style={abPhone}>
            <StateBluetoothOff />
          </DCArtboard>
          <DCArtboard id="st-connecting" label="Reconnecting (after reset / fw reboot)" width={322} height={672} style={abPhone}>
            <StateConnecting />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
