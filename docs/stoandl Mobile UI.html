<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>stoandl — GNOME & KDE UI directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cantarell:wght@400;700&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script src="app-data.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="dir-phosh.jsx"></script>
<script type="text/babel" src="dir-kde.jsx"></script>
<script type="text/babel" src="dir-calm.jsx"></script>
<script type="text/babel" src="desktop.jsx"></script>
<script type="text/babel" src="kde-states.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
  const W = 322, H = 672;
  const ab = { background: 'transparent', borderRadius: 38, boxShadow: 'none' };
  const abD = { background: 'transparent', borderRadius: 12, boxShadow: 'none' };

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="mobile" title="Mobile · postmarketOS / Plasma Mobile"
          subtitle="Three HIG-grounded directions. Each is fully navigable — tap the bottom nav / header, toggle switches, drag sliders, hit Install/Pair for toasts.">
          <DCArtboard id="gnome" label="GNOME · libadwaita (header bar + boxed lists)" width={W} height={H} style={ab}>
            <PhoshApp />
          </DCArtboard>
          <DCArtboard id="kde" label="KDE · Kirigami by-the-book (tab bar + FormCard + FAB)" width={W} height={H} style={ab}>
            <KdeApp />
          </DCArtboard>
          <DCArtboard id="calm" label="Kirigami-calm (KDE native, GNOME-quiet rhythm)" width={W} height={H} style={ab}>
            <CalmApp />
          </DCArtboard>
        </DCSection>
        <DCSection id="states" title="KDE · shared empty / error / loading states"
          subtitle="Cross-screen states CLAUDE.md mandates: daemon-down, no-watch (notready), reconnecting, empty list, loading skeleton, and inline action-error. Same Breeze chrome — 1:1 pixel targets for the QML build.">
          <DCArtboard id="st-daemon" label="Daemon not running (bus name unowned)" width={W} height={H} style={ab}>
            <StateDaemonDown />
          </DCArtboard>
          <DCArtboard id="st-notready" label="No watch · notready (PlaceholderMessage)" width={W} height={H} style={ab}>
            <StateNotReady />
          </DCArtboard>
          <DCArtboard id="st-connecting" label="Reconnecting (after reset / fw reboot)" width={W} height={H} style={ab}>
            <StateConnecting />
          </DCArtboard>
          <DCArtboard id="st-empty" label="Empty list (0 rows)" width={W} height={H} style={ab}>
            <StateListEmpty />
          </DCArtboard>
          <DCArtboard id="st-loading" label="Loading skeleton (first poll in flight)" width={W} height={H} style={ab}>
            <StateLoading />
          </DCArtboard>
          <DCArtboard id="st-error" label="Action error (inline banner, non-blocking)" width={W} height={H} style={ab}>
            <StateActionError />
          </DCArtboard>
        </DCSection>
        <DCSection id="desktop" title="Desktop · convergent"
          subtitle="Same app, large size. GNOME uses an AdwNavigationSplitView; KDE makes the GlobalDrawer a persistent sidebar (modal:false). Click the sidebar to switch sections.">
          <DCArtboard id="gnome-desktop" label="GNOME desktop · libadwaita split view" width={900} height={580} style={abD}>
            <GnomeDesktop />
          </DCArtboard>
          <DCArtboard id="kde-desktop" label="KDE desktop · persistent GlobalDrawer (Breeze)" width={900} height={580} style={abD}>
            <KdeDesktop />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
